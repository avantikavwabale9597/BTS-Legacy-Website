<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTS Legacy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">BTS LEGACY</div>
      <nav>
        <ul class="nav-links">
          <li><a href="#home">Intro</a></li>
          <li><a href="#members">Members</a></li>
          <li><a href="#albums">Albums</a></li>
          <li><a href="#timeline">Timeline</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero" id="home">
      <video autoplay muted loop playsinline class="bg-video">
        <source src="assets/videos/head1.mp4" type="video/mp4" />
      </video>

      <div class="overlay"></div>

      <div class="hero-content">
        <h1 class="title">Welcome To BTS Legacy!</h1>
        <p class="typing-text"></p>
        <a href="#albums" class="btn">Explore Now</a>
      </div>
    </section>

    <footer>
      <p>Made with 💜 for BTS</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="js/main.js"></script>
  </body>
</html>
