<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTS Solo Discography</title>

    <link rel="stylesheet" href="css/album.css" />
    <link rel="stylesheet" href="css/discography.css" />
  </head>

  <body>
    <header class="topbar">
      <a href="index.html" class="back">← Home</a>
      <h1>BTS Solo Discography</h1>
    </header>

    <!-- RM -->
    <section id="rm" class="member-block">
      <h2>RM</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Indigo"
          data-bg="linear-gradient(135deg,#0f2027,#203a43,#2c5364)"
          data-songs="Yun, Still Life, All Day, Forg_tful, Closer, Change pt.2, Lonely, Hectic, Wild Flower, No.2"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Indigo_RM.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="mono."
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="tokyo, seoul, moonchild, badbye, uhgood, everythingoes, forever rain"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/RM_Mono.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="Right Place Wrong Person"
          data-bg="linear-gradient(135deg,#0f2027,#203a43,#2c5364)"
          data-songs="Right People Wrong Place, Nuts, out of love, Domodachi, Groin, Heaven, LOST!, Around the world in a day, come back to me"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/RM_RPWP.jpeg" class="cover" />
        </div>
      </div>
    </section>

    <section id="jin" class="member-block">
      <h2>Jin</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Echo"
          data-bg="linear-gradient(135deg,#0f2027,#203a43,#2c5364)"
          data-songs="Don't Say You Love Me, Nothing Without Your Love, Loser, Rope It, With the Clouds, Background, To Me Today"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Jin_Echo.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="Happy"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Running Wild, I'll Be There, Another Level, Falling, Heart on the Window, I will come to you"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Jin_Happy.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="The Astronaut"
          data-bg="linear-gradient(135deg,#0f2027,#203a43,#2c5364)"
          data-songs="The Astronaut"
        >
          <div class="disc"></div>
          <img
            src="assets/images/albums/The_Astronaut_jin.jpeg"
            class="cover"
          />
        </div>
      </div>
    </section>

    <section id="suga" class="member-block">
      <h2>Suga</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Agust D"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Intro:DT sugA, Agust D, give it to me, skit, 140503 at dawn, The Last, Tony Montana, so far away"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Agust_D.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="D-2"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Moonlight, Daechwita, What do you think?, Strange, 28, Burn It, People, Honsool, Interlude:Set me free, Dear my friend"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/D-2_Agust D.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="D-Day"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="D-Day, Haegeum, HUH?!, AMYGDALA, SDL, People Pt.2, Polar Night, Interlude:Dawn, Snooze, Life Goes On"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Agust_D_D-Day.jpeg" class="cover" />
        </div>
      </div>
    </section>

    <section id="jhope" class="member-block">
      <h2>J-Hope</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Hope World"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Hope World, P.O.P(Piece Of Peace)Pt.1, Daydream, Base Line, HANGSANG, Airplane, Blue Side"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Hope_World_Jhope.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="Jack In The Box"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Pandora's Box, MORE, STOP, =(Equal Sign), Music Box:Reflection, What if..., Safety Zone, Future, Arson"
        >
          <div class="disc"></div>
          <img
            src="assets/images/albums/J-Hope_Jack_in_the_Box.jpeg"
            class="cover"
          />
        </div>
      </div>
    </section>

    <section id="jimin" class="member-block">
      <h2>Jimin</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="FACE"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Face-off, Interlude:Dive, Like Crazy, Alone, Set Me Free Pt.2, Like Crazy(English Version)"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Face_jm.jpeg" class="cover" />
        </div>

        <div
          class="album-card"
          data-title="MUSE"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Rebirth(Intro), Interlude:Showtime, Smeraldo Garden Marching Band, Slow Dance, Be Mine, Who, Closer Than This"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/Jimin_Muse.jpeg" class="cover" />
        </div>
      </div>
    </section>

    <section id="v" class="member-block">
      <h2>V</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Layover"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="Rainy Days, Blue, Love Me Again, Slow Dancing, For Us, Slow Dancing(Piano Ver.)"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/V_Layover.jpeg" class="cover" />
        </div>
      </div>
    </section>

    <section id="jk" class="member-block">
      <h2>Jungkook</h2>

      <div class="album-strip">
        <div
          class="album-card"
          data-title="Golden"
          data-bg="linear-gradient(130deg,#ffffff,#000000)"
          data-songs="3D, Closer To You, Seven(Explicit Ver.), Standing Next to You, Yes or No, Please Don't Change, Hate You, Somebody, Too Sad to Dance, Shot Glass of Tears, Seven(Clean Ver.)"
        >
          <div class="disc"></div>
          <img src="assets/images/albums/JK_Golden.jpeg" class="cover" />
        </div>
      </div>
    </section>

    <div class="popup" id="popup">
      <div class="book">
        <div class="paper">
          <span class="close">✕</span>
          <h2 id="albumTitle"></h2>

          <div id="songList" class="song-grid"></div>

          <iframe
            id="spotifyPlayer"
            src=""
            width="100%"
            height="152"
            frameborder="0"
            allow="
              autoplay;
              clipboard-write;
              encrypted-media;
              fullscreen;
              picture-in-picture;
            "
            style="display: none; border-radius: 12px; margin-top: 14px"
          >
          </iframe>
        </div>
      </div>
    </div>

    <script src="js/tracks.js"></script>
    <script src="js/slider.js"></script>
  </body>
</html>
